# NGINX hardening profile for anti-scanning and anti-automation defense.
# Apply this on a self-hosted NGINX server. If you deploy only on Vercel,
# keep this file as reference and use Cloudflare WAF/rate limits instead.

# Per-IP strict request rate: 5 requests/second
limit_req_zone $binary_remote_addr zone=per_ip_rate:20m rate=5r/s;

# Optional per-IP concurrent connections cap
limit_conn_zone $binary_remote_addr zone=per_ip_conn:20m;

# Detect common offensive scanners by User-Agent
map $http_user_agent $is_bad_ua {
    default 0;
    ~*(python-requests|sqlmap|nmap|dirbuster|nikto|masscan|zgrab|wpscan|gobuster|ffuf|acunetix|nessus) 1;
}

# Access logs with enough context for fail2ban correlation
log_format security '$remote_addr - $host [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" rt=$request_time';

server {
    listen 80;
    server_name example.com www.example.com;

    access_log /var/log/nginx/access.log security;
    error_log  /var/log/nginx/error.log notice;

    # Return 429 when over limit (observed by fail2ban)
    limit_req_status 429;
    limit_req_log_level notice;

    # Block known scanner tools without detailed feedback
    if ($is_bad_ua) {
        return 444;
    }

    # Silent drop for sensitive paths usually targeted by scanners.
    # NOTE: remove '/admin' if your app really needs it.
    location ~* ^/(?:\.env|\.git|\.svn|\.hg|wp-admin|wp-login\.php|actuator|phpmyadmin|cgi-bin|admin)(?:/|$) {
        return 444;
    }

    location / {
        # Strict per-IP limit, no burst tolerance
        limit_req zone=per_ip_rate burst=0 nodelay;
        limit_conn per_ip_conn 20;

        root /var/www/kidtokid/dist;
        try_files $uri /index.html;
    }
}
